name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Frozen fixture pin: anortham/miller, the commit the protocol contract and the
  # conformance goldens were taken from. Bumping it is a contract decision, not a CI edit.
  MILLER_PIN: 8edfa14ffb4f0f696d6c4c4aaa572d5967495961

jobs:
  fast:
    name: fast (fmt + clippy + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain from rust-toolchain.toml
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add clippy rustfmt
          rustc --version
          cargo --version

      # llama-cpp-sys-2 builds vendored llama.cpp with CMake; without it the crate cannot build.
      - name: Verify cmake is present
        run: cmake --version

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      # Non-ignored tests only: no model weights, no network, no spawned sidecar.
      - name: cargo test
        run: cargo test

      - name: Python harness tests
        run: python3 -B -m unittest discover -s scripts/tests -p 'test_*.py'

  conformance:
    name: conformance (${{ matrix.name }})
    needs: fast
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      # CI covers only what the reference machine (macOS arm64) cannot prove locally.
      # PR pushes run the 1x-billed Linux leg; pushes to main add Windows; the
      # 10x-billed macOS legs run on workflow_dispatch only — they burned ~1,100
      # macOS minutes in one day of PR iteration (2026-07-20) re-proving the platform
      # every local branch gate already covers.
      matrix:
        include: >-
          ${{ github.event_name == 'pull_request'
              && fromJSON('[{"name":"linux-x64","os":"ubuntu-latest"}]')
              || github.event_name == 'push'
              && fromJSON('[{"name":"linux-x64","os":"ubuntu-latest"},{"name":"windows-x64","os":"windows-2022"}]')
              || fromJSON('[{"name":"macos-arm64","os":"macos-15"},{"name":"macos-x64","os":"macos-15-intel"},{"name":"linux-x64","os":"ubuntu-latest"},{"name":"windows-x64","os":"windows-2022"}]') }}
    env:
      JULIE_EMBEDDING_CACHE_DIR: ${{ github.workspace }}/model-cache
      JULIE_SIDECAR_FORCE_BACKEND: cpu
      FIXTURES_DIR: ${{ github.workspace }}/miller-fixtures/eval/sidecar-conformance
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout sidecar
        uses: actions/checkout@v4

      - name: Checkout pinned Miller fixtures
        uses: actions/checkout@v4
        with:
          repository: anortham/miller
          ref: ${{ env.MILLER_PIN }}
          path: miller-fixtures
          sparse-checkout: eval/sidecar-conformance
          sparse-checkout-cone-mode: false

      - name: Install toolchain from rust-toolchain.toml
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustc --version
          cargo --version

      - name: Verify cmake is present
        run: cmake --version

      - name: Install Vulkan ICD (lavapipe) and tools
        if: matrix.name == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools

      # Diagnostic only while the build is CPU-only. When the accelerated (backend-DL)
      # builds land, this becomes the hard assertion that the packaged Vulkan backend
      # module actually loads and registers from the executable-relative plugin dir.
      - name: Vulkan diagnostic
        if: matrix.name == 'linux-x64'
        run: vulkaninfo --summary || true

      - uses: Swatinem/rust-cache@v2

      # Key = both manifest sha256 values (src/manifest.rs, qwen3 then bge). A pin bump
      # changes the key, so the next run re-prepares instead of serving a stale weight file.
      - name: Restore model cache
        id: models
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/model-cache
          key: models-${{ runner.os }}-${{ runner.arch }}-421a27e58d165478cc7acb984a688c2aa41404968b0203e7cd743ece44c54340-bf40c42ad7d89382e9ba7376d5c4b73f6b556cb541fab37aaa1da9c320149b65

      # Cache miss doubles as the prepare end-to-end test: real downloads, real
      # sha256-before-visibility, real cache layout.
      - name: Prepare pinned models
        if: steps.models.outputs.cache-hit != 'true'
        # HuggingFace intermittently answers 503; retry with backoff before failing the leg.
        run: |
          mkdir -p "$JULIE_EMBEDDING_CACHE_DIR"
          retry() {
            for attempt in 1 2 3; do
              if cargo run --release -- prepare "$@"; then return 0; fi
              if [ "$attempt" = 3 ]; then echo "prepare failed after 3 attempts" >&2; return 1; fi
              sleep $((attempt * 30))
            done
          }
          retry --model qwen3-0.6b-f16
          retry --model bge-small-en-v1.5-f32

      - name: Build release binary
        run: cargo build --release

      # The full Task 7 gate: Group A (wire), Group B (lifecycle + hard budgets),
      # Group C (both models, every fixture text) plus every other ignored test.
      # The ignored targets run as separate bounded steps so a hang names the target
      # that hung instead of taking the whole leg down opaquely (2026-07-20: the
      # combined step passed conformance 9/9, then stalled 30 min in a later target
      # and the runner was reclaimed).
      - name: Conformance gate (groups A, B, C)
        # B5's 30 s contract budget is the hard bar on end-user hardware and in the
        # local branch gate (reference machine: 7.8 s). Shared 2-3 core CI runners
        # miss it on raw throughput (84-507 s observed 2026-07-20), so CI raises the
        # ceiling; correctness rows are unaffected.
        timeout-minutes: 45
        env:
          CONFORMANCE_B5_BUDGET_MS: "600000"
        run: cargo test --release --test conformance -- --ignored --test-threads=1 --nocapture

      # Each test gets its own process: a qwen3 engine reserves a 3.5 GB KV cache on
      # top of the 1.2 GB model, and sharing one process across tests killed the
      # runner outright twice (2026-07-20). Slow, not hanging — the budget-length
      # embed alone takes 22 min on a 2-core runner, seconds on the reference machine.
      - name: Model-backed engine tests
        timeout-minutes: 90
        run: |
          cargo test --release --test engine_tests -- --ignored --list \
            | sed -n 's/: test$//p' \
            | while IFS= read -r name; do
            if [[ "${{ github.event_name }}" != "workflow_dispatch" \
                  && "$name" =~ ^qwen3_(worst_case_prose_saturates_the_whole_token_budget|truncates_prose_whose_pieces_exceed_the_initial_buffer_guess|embeds_a_long_sub_budget_input_without_error)$ ]]; then
              continue
            fi
            echo "::group::$name"
            cargo test --release --test engine_tests -- --ignored --exact "$name" --nocapture
            echo "::endgroup::"
          done

      - name: Model-backed serve tests
        timeout-minutes: 30
        run: cargo test --release --test serve_tests -- --ignored --test-threads=1 --nocapture

  artifact-validation:
    name: artifact validation (${{ matrix.name }}) — compile/package only, not support evidence
    needs: fast
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: apple-arm64-metal-portable
            os: macos-15
            profile: apple-arm64-metal-portable
            backend: metal
            package_shell: bash
          - name: apple-x64-metal-portable
            os: macos-15-intel
            profile: apple-x64-metal-portable
            backend: metal
            package_shell: bash
          - name: linux-x64-vulkan-portable
            os: ubuntu-24.04
            profile: linux-x64-vulkan-portable
            backend: vulkan
            package_shell: bash
          - name: windows-x64-vulkan-portable
            os: windows-2022
            profile: windows-x64-vulkan-portable
            backend: vulkan
            package_shell: pwsh
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain from rust-toolchain.toml
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustc --version
          cargo --version

      - name: Prepare Vulkan SDK for compile proof
        if: matrix.backend == 'vulkan'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true
          quiet: true

      - name: Install Windows SPIR-V CMake package
        if: matrix.backend == 'vulkan' && runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.309.0
          vulkan-components: SPIRV-Headers
          vulkan-use-cache: true

      - name: Configure Windows compiler environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Select Ninja for Windows CMake builds
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          subst T: $env:RUNNER_TEMP
          if ($LASTEXITCODE -ne 0) { throw "failed to create short build drive" }
          "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_TARGET_DIR=T:\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Expose Vulkan CMake package prefix
        if: matrix.backend == 'vulkan'
        shell: bash
        run: echo "CMAKE_PREFIX_PATH=${VULKAN_SDK}" >> "${GITHUB_ENV}"

      - uses: Swatinem/rust-cache@v2

      - name: Compile and package portable profile with Bash
        if: matrix.package_shell == 'bash'
        run: bash scripts/package.sh --profile "${{ matrix.profile }}" | tee package.log

      - name: Compile and package portable profile with PowerShell
        if: matrix.package_shell == 'pwsh'
        shell: pwsh
        run: '& ./scripts/package.ps1 -Profile "${{ matrix.profile }}" *>&1 | Tee-Object package.log'

      - name: Validate newly unpacked archive with Bash without claiming hardware support
        if: matrix.package_shell == 'bash'
        run: |
          archive="$(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print -quit)"
          expected="$(awk '{print $1}' "$archive.sha256")"
          bash scripts/hardware-smoke.sh \
            --archive "$archive" \
            --sha256 "$expected" \
            --backend "${{ matrix.backend }}" \
            --lane "${{ matrix.profile }}" \
            --artifact-validation \
            --evidence-dir "artifact-validation/${{ matrix.profile }}"

      - name: Validate newly unpacked archive with PowerShell without claiming hardware support
        if: matrix.package_shell == 'pwsh'
        shell: pwsh
        run: |
          $archive = Get-ChildItem dist -File -Filter '*.zip' | Select-Object -First 1
          if ($null -eq $archive) { throw 'packaging produced no zip archive' }
          $expected = ((Get-Content "$($archive.FullName).sha256") -split '\s+')[0]
          & ./scripts/hardware-smoke.ps1 `
            -Archive $archive.FullName `
            -Sha256 $expected `
            -Backend "${{ matrix.backend }}" `
            -Lane "${{ matrix.profile }}" `
            -ArtifactValidation `
            -EvidenceDir "artifact-validation/${{ matrix.profile }}"

      - name: Upload archive validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: artifact-validation-${{ matrix.profile }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/${{ matrix.profile }}/package-manifest.json
            artifact-validation/${{ matrix.profile }}/**
            package.log
          if-no-files-found: error
