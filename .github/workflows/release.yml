name: release (artifacts only)

# workflow_dispatch ONLY, and there is deliberately NO publish step: no `gh release`,
# no softprops/action-gh-release, no tag creation. This workflow builds the platform
# archives and uploads them as workflow artifacts so they can be inspected. Publishing a
# release requires explicit user approval and a separate, deliberately armed workflow.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    name: package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-15
          - name: macos-x64
            os: macos-15-intel
          - name: linux-x64
            os: ubuntu-latest
          - name: windows-x64
            os: windows-2025
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain from rust-toolchain.toml
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustc --version
          cargo --version

      - name: Verify cmake is present
        run: cmake --version

      - uses: Swatinem/rust-cache@v2

      # package.sh --smoke runs the packaged binary's `--version` and an offline
      # not-ready health round trip (empty JULIE_EMBEDDING_CACHE_DIR, no model needed)
      # against the staged layout BEFORE the archive is written.
      - name: Build, smoke, and archive the packaged layout
        run: bash scripts/package.sh --smoke

      - name: Upload archive and sha256 sidecar
        uses: actions/upload-artifact@v4
        with:
          name: julie-semantic-sidecar-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
