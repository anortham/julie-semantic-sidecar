name: artifact candidates (manual and approval gated)

on:
  workflow_dispatch:
    inputs:
      hardware_lane:
        description: Exact package profile whose archive checksum must match
        required: true
        type: choice
        options:
          - apple-arm64-metal-portable
          - apple-x64-metal-portable
          - linux-x64-vulkan-portable
          - windows-x64-vulkan-portable
          - linux-x64-cuda-vendor
          - windows-x64-cuda-vendor
      expected_archive_sha256:
        description: Lowercase SHA-256 expected for the selected hardware lane
        required: true
        type: string
      include_cuda_candidates:
        description: Build optional CUDA vendor candidates
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  approval:
    name: approve private artifact candidates
    runs-on: ubuntu-latest
    environment: artifact-release-approval
    steps:
      - name: Validate checksum-bound lane request
        env:
          HARDWARE_LANE: ${{ inputs.hardware_lane }}
          EXPECTED_ARCHIVE_SHA256: ${{ inputs.expected_archive_sha256 }}
          INCLUDE_CUDA_CANDIDATES: ${{ inputs.include_cuda_candidates }}
        run: |
          [[ "$EXPECTED_ARCHIVE_SHA256" =~ ^[0-9a-f]{64}$ ]] || {
            echo "expected_archive_sha256 must be 64 lowercase hexadecimal characters" >&2
            exit 2
          }
          if [[ "$HARDWARE_LANE" == *-cuda-vendor && "$INCLUDE_CUDA_CANDIDATES" != "true" ]]; then
            echo "the selected CUDA lane requires include_cuda_candidates" >&2
            exit 2
          fi
          printf 'lane=%s\nsha256=%s\n' "$HARDWARE_LANE" "$EXPECTED_ARCHIVE_SHA256"

  package:
    name: private artifact candidate (${{ matrix.profile }})
    needs: approval
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ inputs.include_cuda_candidates
              && fromJSON('[{"os":"macos-15","profile":"apple-arm64-metal-portable","backend":"metal","package_shell":"bash"},{"os":"macos-15-intel","profile":"apple-x64-metal-portable","backend":"metal","package_shell":"bash"},{"os":"ubuntu-24.04","profile":"linux-x64-vulkan-portable","backend":"vulkan","package_shell":"bash"},{"os":"windows-2022","profile":"windows-x64-vulkan-portable","backend":"vulkan","package_shell":"pwsh"},{"os":"ubuntu-24.04","profile":"linux-x64-cuda-vendor","backend":"cuda","package_shell":"bash"},{"os":"windows-2022","profile":"windows-x64-cuda-vendor","backend":"cuda","package_shell":"pwsh"}]')
              || fromJSON('[{"os":"macos-15","profile":"apple-arm64-metal-portable","backend":"metal","package_shell":"bash"},{"os":"macos-15-intel","profile":"apple-x64-metal-portable","backend":"metal","package_shell":"bash"},{"os":"ubuntu-24.04","profile":"linux-x64-vulkan-portable","backend":"vulkan","package_shell":"bash"},{"os":"windows-2022","profile":"windows-x64-vulkan-portable","backend":"vulkan","package_shell":"pwsh"}]') }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain from rust-toolchain.toml
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustc --version
          cargo --version

      - name: Prepare Vulkan SDK for artifact build
        if: matrix.backend == 'vulkan'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true
          quiet: true

      - name: Install Windows SPIR-V CMake package
        if: matrix.backend == 'vulkan' && runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.309.0
          vulkan-components: SPIRV-Headers
          vulkan-use-cache: true

      - name: Configure Windows compiler environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Test Windows packaging environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& ./scripts/tests/package-env.tests.ps1'

      - name: Select Ninja for Windows CMake builds
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          subst T: $env:RUNNER_TEMP
          if ($LASTEXITCODE -ne 0) { throw "failed to create short build drive" }
          "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_TARGET_DIR=T:\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Expose Vulkan CMake package prefix
        if: matrix.backend == 'vulkan'
        shell: bash
        run: echo "CMAKE_PREFIX_PATH=${VULKAN_SDK}" >> "${GITHUB_ENV}"

      - name: Prepare CUDA toolkit for optional candidate build
        if: matrix.backend == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: 13.2.0
          log-file-suffix: ${{ matrix.profile }}.txt

      - uses: Swatinem/rust-cache@v2

      - name: Package candidate with Bash
        if: matrix.package_shell == 'bash'
        run: bash scripts/package.sh --profile "${{ matrix.profile }}" | tee package.log

      - name: Package candidate with PowerShell
        if: matrix.package_shell == 'pwsh'
        shell: pwsh
        run: '& ./scripts/package.ps1 -Profile "${{ matrix.profile }}" *>&1 | Tee-Object package.log'

      - name: Verify selected lane checksum and newly unpacked archive with Bash
        if: matrix.package_shell == 'bash'
        env:
          SELECTED_LANE: ${{ inputs.hardware_lane }}
          SELECTED_SHA256: ${{ inputs.expected_archive_sha256 }}
        run: |
          archive="$(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print -quit)"
          generated_sha256="$(awk '{print $1}' "$archive.sha256")"
          expected_sha256="$generated_sha256"
          if [[ "${{ matrix.profile }}" == "$SELECTED_LANE" ]]; then
            expected_sha256="$SELECTED_SHA256"
          fi
          bash scripts/hardware-smoke.sh \
            --archive "$archive" \
            --sha256 "$expected_sha256" \
            --backend "${{ matrix.backend }}" \
            --lane "${{ matrix.profile }}" \
            --artifact-validation \
            --evidence-dir "artifact-validation/${{ matrix.profile }}"

      - name: Verify selected lane checksum and newly unpacked archive with PowerShell
        if: matrix.package_shell == 'pwsh'
        shell: pwsh
        env:
          SELECTED_LANE: ${{ inputs.hardware_lane }}
          SELECTED_SHA256: ${{ inputs.expected_archive_sha256 }}
        run: |
          $archive = Get-ChildItem dist -File -Filter '*.zip' | Select-Object -First 1
          if ($null -eq $archive) { throw 'packaging produced no zip archive' }
          $generatedSha256 = ((Get-Content "$($archive.FullName).sha256") -split '\s+')[0]
          $expectedSha256 = $generatedSha256
          if ("${{ matrix.profile }}" -eq $env:SELECTED_LANE) { $expectedSha256 = $env:SELECTED_SHA256 }
          & ./scripts/hardware-smoke.ps1 `
            -Archive $archive.FullName `
            -Sha256 $expectedSha256 `
            -Backend "${{ matrix.backend }}" `
            -Lane "${{ matrix.profile }}" `
            -ArtifactValidation `
            -EvidenceDir "artifact-validation/${{ matrix.profile }}"

      - name: Upload private archive, manifest, checksum, and raw logs
        uses: actions/upload-artifact@v4
        with:
          name: artifact-candidate-${{ matrix.profile }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/${{ matrix.profile }}/package-manifest.json
            artifact-validation/${{ matrix.profile }}/raw-logs/**
            artifact-validation/${{ matrix.profile }}/archive.sha256
            artifact-validation/${{ matrix.profile }}/identity.txt
            artifact-validation/${{ matrix.profile }}/package-manifest.json
            package.log
          if-no-files-found: error
